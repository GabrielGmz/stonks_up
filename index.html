<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Finanzas Aesthetic</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para los iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos personalizados para la barra de desplazamiento -->
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #F4CCD4;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #EBAFC0;
        }
        
        /* Animaciones suaves para las tarjetas */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-[#FFF5F8] text-[#5D4A55] font-sans selection:bg-[#FDE2E8]">
    <div class="max-w-4xl mx-auto p-5 md:p-8 pt-10">
        
        <!-- Header -->
        <header class="mb-10 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-light tracking-tight flex items-center justify-center md:justify-start gap-2">
                    Mis Finanzas <i data-lucide="sparkles" class="w-6 h-6 text-[#FFB7B2]" stroke-width="1.5"></i>
                </h1>
                <p class="text-[#A8929E] mt-2 font-light">Control de pedidos y ganancias</p>
            </div>
        </header>

        <!-- Tarjetas de Resumen -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
            <!-- Ingresos -->
            <div class="bg-white p-6 rounded-[2rem] shadow-[0_4px_20px_rgb(0,0,0,0.02)] border border-[#FCEEF2] flex flex-col justify-between hover:shadow-[0_4px_25px_rgb(0,0,0,0.04)] transition-shadow">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[#A8929E] font-medium text-sm tracking-wide uppercase">Ingresos Totales</span>
                    <div class="p-3 bg-[#E8F8F5] rounded-2xl">
                        <i data-lucide="trending-up" class="w-5 h-5 text-[#5FC5A8]"></i>
                    </div>
                </div>
                <p id="totalIncome" class="text-3xl font-light text-[#4A3B43]">$0.00</p>
            </div>

            <!-- Gastos -->
            <div class="bg-white p-6 rounded-[2rem] shadow-[0_4px_20px_rgb(0,0,0,0.02)] border border-[#FCEEF2] flex flex-col justify-between hover:shadow-[0_4px_25px_rgb(0,0,0,0.04)] transition-shadow">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[#A8929E] font-medium text-sm tracking-wide uppercase">Gastos en Pedidos</span>
                    <div class="p-3 bg-[#FFEBF0] rounded-2xl">
                        <i data-lucide="trending-down" class="w-5 h-5 text-[#F28C9C]"></i>
                    </div>
                </div>
                <p id="totalExpense" class="text-3xl font-light text-[#4A3B43]">$0.00</p>
            </div>

            <!-- Ganancia -->
            <div class="bg-[#BCA0DC] text-white p-6 rounded-[2rem] shadow-[0_8px_30px_rgba(188,160,220,0.3)] flex flex-col justify-between relative overflow-hidden">
                <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-20 rounded-full blur-2xl"></div>
                <div class="flex justify-between items-start mb-4 relative z-10">
                    <span class="text-white/90 font-medium text-sm tracking-wide uppercase">Ganancia Neta</span>
                    <div class="p-3 bg-white/25 rounded-2xl backdrop-blur-sm">
                        <i data-lucide="wallet" class="w-5 h-5 text-white"></i>
                    </div>
                </div>
                <p id="netProfit" class="text-3xl font-light relative z-10">$0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Formulario -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-[2rem] shadow-[0_4px_20px_rgb(0,0,0,0.02)] border border-[#FCEEF2]">
                    <h2 class="text-xl font-medium mb-6 text-[#4A3B43]">Nuevo Registro</h2>
                    <form id="transactionForm" class="space-y-5">
                        
                        <!-- Selector de Tipo -->
                        <div class="grid grid-cols-2 gap-3 p-1 bg-[#FFF5F8] rounded-2xl">
                            <button
                                type="button"
                                id="btnIngreso"
                                class="py-3 px-4 rounded-xl text-sm font-medium transition-all bg-white text-[#5FC5A8] shadow-sm"
                                onclick="setType('ingreso')"
                            >
                                Venta / Ingreso
                            </button>
                            <button
                                type="button"
                                id="btnGasto"
                                class="py-3 px-4 rounded-xl text-sm font-medium transition-all text-[#A8929E] hover:text-[#5D4A55]"
                                onclick="setType('gasto')"
                            >
                                Gasto / Pedido
                            </button>
                        </div>

                        <!-- Descripción -->
                        <div>
                            <label class="block text-sm text-[#A8929E] mb-2 ml-1">Descripción</label>
                            <input
                                type="text"
                                id="descriptionInput"
                                required
                                placeholder="Ej. Venta de labiales"
                                class="w-full bg-[#FFF5F8] border-none outline-none rounded-2xl px-4 py-4 focus:ring-2 focus:ring-[#BCA0DC] focus:bg-white transition-all text-[#5D4A55] placeholder-[#D8C6CE]"
                            />
                        </div>

                        <!-- Monto -->
                        <div>
                            <label class="block text-sm text-[#A8929E] mb-2 ml-1">Monto ($)</label>
                            <input
                                type="number"
                                id="amountInput"
                                step="0.01"
                                min="0"
                                required
                                placeholder="0.00"
                                class="w-full bg-[#FFF5F8] border-none outline-none rounded-2xl px-4 py-4 focus:ring-2 focus:ring-[#BCA0DC] focus:bg-white transition-all text-[#5D4A55] placeholder-[#D8C6CE]"
                            />
                        </div>

                        <!-- Botón Guardar -->
                        <button
                            type="submit"
                            class="w-full bg-[#BCA0DC] hover:bg-[#A888CD] text-white py-4 rounded-2xl font-medium transition-colors flex items-center justify-center gap-2 mt-2"
                        >
                            <i data-lucide="plus" class="w-5 h-5"></i> Agregar
                        </button>
                    </form>
                </div>
            </div>

            <!-- Lista de Transacciones -->
            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-[2rem] shadow-[0_4px_20px_rgb(0,0,0,0.02)] border border-[#FCEEF2] h-full">
                    <h2 class="text-xl font-medium mb-6 text-[#4A3B43]">Historial</h2>
                    
                    <!-- Contenedor dinámico del historial -->
                    <div id="historyContainer" class="space-y-3 overflow-y-auto max-h-[500px] pr-2 custom-scrollbar">
                        <!-- El contenido se inyectará aquí desde JavaScript -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Script de Lógica JavaScript -->
    <script>
        // Inicializar Iconos
        lucide.createIcons();

        // Estado inicial
        let transactions = JSON.parse(localStorage.getItem('aesthetic_finances_html')) || [];
        let currentType = 'ingreso';

        // Referencias a elementos del DOM
        const historyContainer = document.getElementById('historyContainer');
        const transactionForm = document.getElementById('transactionForm');
        const btnIngreso = document.getElementById('btnIngreso');
        const btnGasto = document.getElementById('btnGasto');
        const descriptionInput = document.getElementById('descriptionInput');
        const amountInput = document.getElementById('amountInput');
        
        // Elementos de resumen
        const totalIncomeEl = document.getElementById('totalIncome');
        const totalExpenseEl = document.getElementById('totalExpense');
        const netProfitEl = document.getElementById('netProfit');

        // Formateador de dinero (Moneda por defecto USD, para El Salvador u otro país dolarizado)
        const formatMoney = (value) => {
            return new Intl.NumberFormat('es-SV', {
                style: 'currency',
                currency: 'USD'
            }).format(value);
        };

        // Cambiar entre tipo de registro (Ingreso / Gasto)
        window.setType = (type) => {
            currentType = type;
            
            // Actualizar estilos de los botones
            if (type === 'ingreso') {
                btnIngreso.className = "py-3 px-4 rounded-xl text-sm font-medium transition-all bg-white text-[#5FC5A8] shadow-sm";
                btnGasto.className = "py-3 px-4 rounded-xl text-sm font-medium transition-all text-[#A8929E] hover:text-[#5D4A55]";
                descriptionInput.placeholder = "Ej. Venta de labiales";
            } else {
                btnGasto.className = "py-3 px-4 rounded-xl text-sm font-medium transition-all bg-white text-[#F28C9C] shadow-sm";
                btnIngreso.className = "py-3 px-4 rounded-xl text-sm font-medium transition-all text-[#A8929E] hover:text-[#5D4A55]";
                descriptionInput.placeholder = "Ej. Pedido a proveedor";
            }
        };

        // Eliminar Transacción
        window.deleteTransaction = (id) => {
            transactions = transactions.filter(t => t.id !== id);
            saveAndRender();
        };

        // Generar un ID único (para compatibilidad en navegadores sin crypto.randomUUID)
        const generateID = () => {
            return 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36);
        };

        // Manejar el envío del formulario
        transactionForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const description = descriptionInput.value.trim();
            const amount = parseFloat(amountInput.value);

            if (!description || isNaN(amount)) return;

            const newTransaction = {
                id: crypto.randomUUID ? crypto.randomUUID() : generateID(),
                description,
                amount,
                type: currentType,
                date: new Date().toLocaleDateString('es-ES', { 
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                })
            };

            // Añadir al inicio de la lista
            transactions.unshift(newTransaction);
            
            // Limpiar formulario
            descriptionInput.value = '';
            amountInput.value = '';
            
            saveAndRender();
        });

        // Guardar en localStorage y actualizar la interfaz
        const saveAndRender = () => {
            localStorage.setItem('aesthetic_finances_html', JSON.stringify(transactions));
            renderUI();
        };

        // Renderizar la Interfaz
        const renderUI = () => {
            // 1. Calcular Totales
            const totalIncome = transactions
                .filter(t => t.type === 'ingreso')
                .reduce((acc, curr) => acc + curr.amount, 0);
                
            const totalExpense = transactions
                .filter(t => t.type === 'gasto')
                .reduce((acc, curr) => acc + curr.amount, 0);
                
            const netProfit = totalIncome - totalExpense;

            // 2. Actualizar textos de resumen
            totalIncomeEl.innerText = formatMoney(totalIncome);
            totalExpenseEl.innerText = formatMoney(totalExpense);
            netProfitEl.innerText = formatMoney(netProfit);

            // 3. Renderizar el Historial
            if (transactions.length === 0) {
                historyContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-48 text-center space-y-4 fade-in">
                        <div class="w-16 h-16 bg-[#FFF5F8] rounded-full flex items-center justify-center">
                            <i data-lucide="package" class="w-8 h-8 text-[#EBC2CB]" stroke-width="1.5"></i>
                        </div>
                        <p class="text-[#A8929E] font-light">Aún no tienes registros.<br/>Comienza agregando tu primer pedido o venta.</p>
                    </div>
                `;
            } else {
                historyContainer.innerHTML = transactions.map((t) => {
                    const isIngreso = t.type === 'ingreso';
                    
                    const bgClass = isIngreso ? 'bg-[#E8F8F5]' : 'bg-[#FFEBF0]';
                    const textClass = isIngreso ? 'text-[#5FC5A8]' : 'text-[#F28C9C]';
                    const iconName = isIngreso ? 'trending-up' : 'trending-down';
                    const sign = isIngreso ? '+' : '-';

                    return `
                        <div class="group flex items-center justify-between p-4 hover:bg-[#FFF5F8] rounded-2xl transition-colors border border-transparent hover:border-[#FCEEF2] fade-in">
                            <div class="flex items-center gap-4">
                                <div class="p-3 rounded-2xl flex-shrink-0 ${bgClass} ${textClass}">
                                    <i data-lucide="${iconName}" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <p class="font-medium text-[#4A3B43]">${t.description}</p>
                                    <p class="text-xs text-[#A8929E] mt-0.5">${t.date}</p>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-4">
                                <span class="font-medium ${textClass}">
                                    ${sign}${formatMoney(t.amount)}
                                </span>
                                <button 
                                    onclick="deleteTransaction('${t.id}')"
                                    class="opacity-0 group-hover:opacity-100 p-2 text-[#EBC2CB] hover:text-[#F28C9C] transition-all rounded-xl hover:bg-white"
                                    title="Eliminar"
                                >
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Re-renderizar iconos de Lucide para los nuevos elementos en el DOM
            lucide.createIcons();
        };

        // Renderizado inicial al cargar la página
        renderUI();

    </script>
</body>
</html>
